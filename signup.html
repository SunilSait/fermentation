 x='29' y='38' width='42' height='6' rx='2' fill='none' stroke='%23B5651D' stroke-width='1' stroke-dasharray='2 2' opacity='0.5'/%3E%3Crect x='36' y='54' width='28' height='20' rx='3' fill='%23FAF6F0' stroke='%23B5651D' stroke-width='1.2' opacity='0.9'/%3E%3Cpath d='M 50 60 L 51.5 63.5 L 55 63.5 L 52 65.5 L 53.5 69 L 50 67 L 46.5 69 L 48 65.5 L 45 63.5 L 48.5 63.5 Z' fill='%23B5651D' opacity='0.8'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#B5651D',secondary:'#3B4A3A'}}}}</script>
</head>
<body>
    <div class="auth-page" id="signup-page">
        <!-- Top-right icons -->
        <div class="auth-top-icons">
            <button class="icon-btn dark-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
            <button class="icon-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-exchange-alt"></i></button>
        </div>

        <div class="auth-card animate-on-scroll zoom-in">
            <!-- Logo -->
            <a href="index.html" class="auth-logo" id="signup-logo">
                <svg width="36" height="36" viewBox="0 0 100 100" fill="none" class="group-hover:scale-105 transition-transform" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="jarGlassGradAuth" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--logo-primary)" stop-opacity="0.02"/>
                            <stop offset="100%" stop-color="var(--logo-primary)" stop-opacity="0.12"/>
                        </linearGradient>
                        <linearGradient id="lidGradAuth" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="var(--logo-primary)"/>
                            <stop offset="50%" stop-color="var(--primary-light, #D4883E)"/>
                            <stop offset="100%" stop-color="var(--logo-primary)"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="46" stroke="var(--logo-primary)" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>
                    <circle cx="50" cy="50" r="42" stroke="var(--logo-primary)" stroke-width="0.75" stroke-dasharray="3 3" stroke-opacity="0.4" fill="none"/>
                    <path d="M38 18h24v4H38z" fill="url(#lidGradAuth)" rx="1"/>
                    <path d="M35 22h30v5a2 2 0 0 1-2 2H37a2 2 0 0 1-2-2v-5z" fill="url(#lidGradAuth)"/>
                    <line x1="40" y1="24" x2="40" y2="28" stroke="var(--cream, #FAF6F0)" stroke-width="0.75" opacity="0.6"/>
                    <line x1="45" y1="24" x2="45" y2="28" stroke="var(--cream, #FAF6F0)" stroke-width="0.75" opacity="0.6"/>
                    <line x1="50" y1="24" x2="50" y2="28" stroke="var(--cream, #FAF6F0)" stroke-width="0.75" opacity="0.6"/>
                    <line x1="55" y1="24" x2="55" y2="28" stroke="var(--cream, #FAF6F0)" stroke-width="0.75" opacity="0.6"/>
                    <line x1="60" y1="24" x2="60" y2="28" stroke="var(--cream, #FAF6F0)" stroke-width="0.75" opacity="0.6"/>
                    <path d="M 35 29 C 32 35, 26 38, 26 48 L 26 84 C 26 89, 30 92, 36 92 L 64 92 C 70 92, 74 89, 74 84 L 74 48 C 74 38, 68 35, 65 29 Z" fill="url(#jarGlassGradAuth)" stroke="var(--logo-primary)" stroke-width="2.5" stroke-linejoin="round"/>
                    <path d="M 30 46 L 30 82" stroke="var(--cream, #FAF6F0)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
                    <line x1="64" y1="46" x2="70" y2="46" stroke="var(--logo-primary)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
                    <line x1="66" y1="54" x2="70" y2="54" stroke="var(--logo-primary)" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
                    <line x1="64" y1="62" x2="70" y2="62" stroke="var(--logo-primary)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
                    <line x1="66" y1="70" x2="70" y2="70" stroke="var(--logo-primary)" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
                    <line x1="64" y1="78" x2="70" y2="78" stroke="var(--logo-primary)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
                    <rect x="29" y="38" width="42" height="6" rx="2" fill="var(--logo-primary)" opacity="0.12"/>
                    <rect x="29" y="38" width="42" height="6" rx="2" fill="none" stroke="var(--logo-primary)" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
                    <rect x="36" y="54" width="28" height="20" rx="3" fill="var(--cream, #FAF6F0)" stroke="var(--logo-primary)" stroke-width="1.2" opacity="0.9"/>
                    <path d="M 50 60 L 51.5 63.5 L 55 63.5 L 52 65.5 L 53.5 69 L 50 67 L 46.5 69 L 48 65.5 L 45 63.5 L 48.5 63.5 Z" fill="var(--logo-primary)" opacity="0.8"/>
                </svg>
                Jarcraft
            </a>

            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start your fermentation journey today</p>

            <form id="signup-form" onsubmit="event.preventDefault();window.location.href='student-dashboard.html';">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label for="signup-firstname">First Name</label>
                        <input type="text" id="signup-firstname" class="form-input" placeholder="First" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-lastname">Last Name</label>
                        <input type="text" id="signup-lastname" class="form-input" placeholder="Last" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signup-password" class="form-input" placeholder="Create password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signup-confirm" class="form-input" placeholder="Confirm password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="signup-submit" style="margin-top:8px;">Create Account</button>
            </form>

            <div class="auth-divider">or sign up with</div>

            <!-- Social Login -->
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button class="btn-social btn-full" id="signup-google" style="display:flex;align-items:center;justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign up with Google
                </button>
                <button class="btn-social btn-full" id="signup-apple" style="display:flex;align-items:center;justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Sign up with Apple
                </button>
            </div>

            <p class="auth-footer-text">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
